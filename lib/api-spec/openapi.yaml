openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Velik e-commerce API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: cart
    description: Shopping cart operations
  - name: orders
    description: Order operations
  - name: reviews
    description: Review operations
  - name: repair
    description: Repair service operations
  - name: auth
    description: Authentication operations
  - name: promotions
    description: Promotions and discounts
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Categories ───────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [admin]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    patch:
      operationId: updateCategory
      tags: [admin]
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [admin]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Products ─────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: minPrice
          in: query
          schema:
            type: ["number", "null"]
        - name: maxPrice
          in: query
          schema:
            type: ["number", "null"]
        - name: brand
          in: query
          schema:
            type: ["string", "null"]
        - name: inStock
          in: query
          schema:
            type: ["boolean", "null"]
        - name: sortBy
          in: query
          schema:
            type: ["string", "null"]
            enum: ["price_asc", "price_desc", "rating", "newest", null]
        - name: page
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
    post:
      operationId: createProduct
      tags: [admin]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: getFeaturedProducts
      tags: [products]
      summary: Get featured/hero products
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/popular:
    get:
      operationId: getPopularProducts
      tags: [products]
      summary: Get popular products
      responses:
        "200":
          description: Popular products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/new-arrivals:
    get:
      operationId: getNewArrivals
      tags: [products]
      summary: Get newest products
      responses:
        "200":
          description: New arrivals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [admin]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [admin]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/related:
    get:
      operationId: getRelatedProducts
      tags: [products]
      summary: Get related products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Related products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  # ─── Reviews ──────────────────────────────────────────────────────────────
  /products/{productId}/reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # ─── Cart ─────────────────────────────────────────────────────────────────
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current cart
      responses:
        "200":
          description: Cart contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "201":
          description: Cart item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"

  /cart/items/{itemId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /cart/clear:
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear all cart items
      responses:
        "204":
          description: Cleared

  # ─── Orders ───────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (admin) or current user orders
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: page
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [admin]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ─── Auth ─────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ─── Wishlist ─────────────────────────────────────────────────────────────
  /wishlist:
    get:
      operationId: getWishlist
      tags: [auth]
      summary: Get wishlist items
      responses:
        "200":
          description: Wishlist
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /wishlist/{productId}:
    post:
      operationId: addToWishlist
      tags: [auth]
      summary: Add product to wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Added
    delete:
      operationId: removeFromWishlist
      tags: [auth]
      summary: Remove product from wishlist
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # ─── Repair ───────────────────────────────────────────────────────────────
  /repair-requests:
    get:
      operationId: listRepairRequests
      tags: [repair]
      summary: List repair requests
      responses:
        "200":
          description: Repair requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RepairRequest"
    post:
      operationId: createRepairRequest
      tags: [repair]
      summary: Submit repair request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepairRequestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairRequest"

  /repair-requests/{id}:
    patch:
      operationId: updateRepairRequest
      tags: [admin]
      summary: Update repair request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepairRequestUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairRequest"

  # ─── Promotions ───────────────────────────────────────────────────────────
  /promotions:
    get:
      operationId: listPromotions
      tags: [promotions]
      summary: List active promotions
      responses:
        "200":
          description: Promotions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Promotion"
    post:
      operationId: createPromotion
      tags: [admin]
      summary: Create promotion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Promotion"

  # ─── Stats ────────────────────────────────────────────────────────────────
  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [admin]
      summary: Admin dashboard summary stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/brands:
    get:
      operationId: getPopularBrands
      tags: [products]
      summary: Get popular brands with product counts
      responses:
        "200":
          description: Brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrandStat"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Category:
      type: object
      required: [id, name, slug, icon]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
        description:
          type: ["string", "null"]
        productCount:
          type: integer
        imageUrl:
          type: ["string", "null"]

    CategoryInput:
      type: object
      required: [name, slug, icon]
      properties:
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    Product:
      type: object
      required: [id, name, slug, price, categoryId, brand, inStock, imageUrl, rating, reviewCount]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        price:
          type: number
        oldPrice:
          type: ["number", "null"]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        brand:
          type: string
        inStock:
          type: boolean
        stockCount:
          type: integer
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        rating:
          type: number
        reviewCount:
          type: integer
        badge:
          type: ["string", "null"]
          description: "ХИТ ПРОДАЖ | ТОП ВЫБОР | НОВИНКА | ЛУЧШАЯ ЦЕНА | ЭКО"
        isFeatured:
          type: boolean
        isNew:
          type: boolean
        discountPercent:
          type: ["integer", "null"]

    ProductDetail:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            description:
              type: ["string", "null"]
            specs:
              type: object
              additionalProperties:
                type: string
            relatedProducts:
              type: array
              items:
                $ref: "#/components/schemas/Product"

    ProductList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ProductInput:
      type: object
      required: [name, slug, price, categoryId, brand, imageUrl]
      properties:
        name:
          type: string
        slug:
          type: string
        price:
          type: number
        oldPrice:
          type: ["number", "null"]
        categoryId:
          type: integer
        brand:
          type: string
        inStock:
          type: boolean
        stockCount:
          type: integer
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        description:
          type: ["string", "null"]
        specs:
          type: object
          additionalProperties:
            type: string
        badge:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        isNew:
          type: boolean

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        oldPrice:
          type: ["number", "null"]
        categoryId:
          type: integer
        brand:
          type: string
        inStock:
          type: boolean
        stockCount:
          type: integer
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        description:
          type: ["string", "null"]
        specs:
          type: object
          additionalProperties:
            type: string
        badge:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        isNew:
          type: boolean

    Review:
      type: object
      required: [id, productId, authorName, rating, text, createdAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        authorName:
          type: string
        rating:
          type: integer
        text:
          type: string
        createdAt:
          type: string

    ReviewInput:
      type: object
      required: [authorName, rating, text]
      properties:
        authorName:
          type: string
        rating:
          type: integer
        text:
          type: string

    CartItem:
      type: object
      required: [id, productId, quantity, product]
      properties:
        id:
          type: integer
        productId:
          type: integer
        quantity:
          type: integer
        product:
          $ref: "#/components/schemas/Product"

    Cart:
      type: object
      required: [items, total, itemCount]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        total:
          type: number
        itemCount:
          type: integer

    CartItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        sessionId:
          type: ["string", "null"]

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer

    Order:
      type: object
      required: [id, status, total, createdAt, items]
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        total:
          type: number
        createdAt:
          type: string
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: ["string", "null"]
        deliveryAddress:
          type: ["string", "null"]
        deliveryMethod:
          type: string
          enum: [delivery, pickup]
        paymentMethod:
          type: string
          enum: [online, cash]
        comment:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderItem:
      type: object
      required: [id, productId, quantity, price, productName, productImageUrl]
      properties:
        id:
          type: integer
        productId:
          type: integer
        quantity:
          type: integer
        price:
          type: number
        productName:
          type: string
        productImageUrl:
          type: string

    OrderInput:
      type: object
      required: [customerName, customerPhone, deliveryMethod, paymentMethod, items]
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: ["string", "null"]
        deliveryAddress:
          type: ["string", "null"]
        deliveryMethod:
          type: string
          enum: [delivery, pickup]
        paymentMethod:
          type: string
          enum: [online, cash]
        comment:
          type: ["string", "null"]
        sessionId:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderItemInput:
      type: object
      required: [productId, quantity, price]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        price:
          type: number

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]

    User:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string
        phone:
          type: ["string", "null"]

    LoginInput:
